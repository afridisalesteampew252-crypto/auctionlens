<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AuctionLens PK | AI Scanner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes slideIn {
            from { transform: translateX(-100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        @keyframes slideOut {
            from { transform: translateX(0); opacity: 1; }
            to { transform: translateX(-100%); opacity: 0; }
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .animate-slide-in { animation: slideIn 0.3s ease-out; }
        .animate-slide-out { animation: slideOut 0.3s ease-out; }
        .animate-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen font-sans flex flex-col items-center py-8">
    
    <!-- Toast Container -->
    <div id="toastContainer" class="fixed top-4 left-4 right-4 z-[100] flex flex-col gap-2 pointer-events-none"></div>

    <div id="viewScanner" class="w-full max-w-md px-4 flex flex-col items-center gap-6">
        <div class="text-center">
            <h1 class="text-blue-500 font-black italic text-3xl uppercase tracking-tighter">AuctionLens PK</h1>
            <p class="text-slate-500 text-[10px] uppercase tracking-[0.2em] font-bold">Expert AI Sheet Analysis</p>
        </div>

        <div class="relative w-full aspect-[3/4] bg-slate-900 rounded-3xl border border-slate-800 overflow-hidden shadow-2xl">
            <video id="video" class="absolute inset-0 w-full h-full object-cover hidden" autoplay playsinline></video>
            <img id="previewImg" class="absolute inset-0 w-full h-full object-cover hidden" />
            
            <div id="placeholderText" class="absolute inset-0 flex flex-col items-center justify-center p-8 text-center">
                <div class="w-16 h-16 bg-blue-600/10 rounded-full flex items-center justify-center mb-4">
                    <svg class="w-8 h-8 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path></svg>
                </div>
                <p class="text-sm font-bold text-slate-400">Ready to Scan</p>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-3 w-full">
            <button id="btnCam" class="bg-slate-900 border border-slate-800 py-4 rounded-2xl flex flex-col items-center gap-2 hover:bg-slate-800 hover:border-blue-500 transition-all duration-200 group">
                <svg class="w-5 h-5 text-blue-500 group-hover:scale-110 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path></svg>
                <span class="text-[10px] font-black uppercase text-blue-500">Camera</span>
            </button>
            <label class="bg-slate-900 border border-slate-800 py-4 rounded-2xl flex flex-col items-center gap-2 cursor-pointer hover:bg-slate-800 hover:border-blue-500 transition-all duration-200 group">
                <input type="file" id="fileIn" class="hidden" accept="image/*">
                <svg class="w-5 h-5 text-blue-500 group-hover:scale-110 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                <span class="text-[10px] font-black uppercase text-blue-500">Gallery</span>
            </label>
        </div>
        
        <!-- Help Text -->
        <p class="text-[9px] text-slate-500 text-center italic">📸 Capture a clear, well-lit auction sheet for best results</p>

        <button id="shutter" class="hidden w-full bg-white text-black font-black py-5 rounded-2xl uppercase tracking-widest shadow-xl hover:bg-slate-100 active:scale-95 transition-all">📸 Capture Sheet</button>
        <button id="analyze" class="hidden w-full bg-blue-600 text-white font-black py-5 rounded-2xl uppercase tracking-widest shadow-lg shadow-blue-900/40 hover:bg-blue-700 active:scale-95 transition-all">⚡ Process Sheet</button>

        <div id="result" class="hidden w-full bg-slate-900 rounded-3xl border border-slate-800 p-6 space-y-6 mb-28">
            <div id="verdictBox" class="p-4 rounded-xl border-2 text-center bg-slate-950">
                <p id="resVerdict" class="font-black italic text-lg uppercase"></p>
            </div>

            <div class="grid grid-cols-3 gap-2">
                <div class="bg-slate-950 p-3 rounded-xl border border-slate-800 text-center hover:border-blue-500 transition-colors">
                    <p class="text-[8px] text-slate-500 uppercase font-bold">Year</p>
                    <p id="resYear" class="text-sm font-black text-white">-</p>
                </div>
                <div class="bg-slate-950 p-3 rounded-xl border border-slate-800 text-center hover:border-blue-500 transition-colors">
                    <p class="text-[8px] text-slate-500 uppercase font-bold">Grade</p>
                    <p id="resGrade" class="text-sm font-black text-white">-</p>
                </div>
                <div class="bg-slate-950 p-3 rounded-xl border border-slate-800 text-center hover:border-blue-500 transition-colors">
                    <p class="text-[8px] text-slate-500 uppercase font-bold">Interior</p>
                    <p id="resInterior" class="text-sm font-black text-white">-</p>
                </div>
            </div>

            <div class="space-y-4">
                <div>
                    <p class="text-[9px] text-slate-500 uppercase font-bold mb-1">Chassis Number</p>
                    <button id="resChassis" class="w-full text-white font-bold bg-slate-950 p-2 rounded-lg border border-slate-800 hover:border-blue-500 active:scale-95 transition-all text-left cursor-pointer">-</button>
                    <p class="text-[8px] text-slate-600 mt-1">👆 Click to copy</p>
                </div>
                <div>
                    <p class="text-[9px] text-slate-500 uppercase font-bold mb-1">AI Summary</p>
                    <div id="resSummary" class="text-xs text-slate-300 leading-relaxed bg-slate-950 p-3 rounded-lg border border-slate-800 min-h-24"></div>
                </div>
                <div>
                    <p class="text-[9px] text-slate-500 uppercase font-bold mb-1">Exterior Condition</p>
                    <div id="resExterior" class="text-xs text-slate-300 leading-relaxed bg-slate-950 p-3 rounded-lg border border-slate-800 min-h-16"></div>
                </div>
            </div>

            <button id="whatsappBtn" class="w-full bg-[#25D366] text-white font-black py-4 rounded-xl uppercase tracking-widest text-xs flex items-center justify-center gap-2 hover:bg-[#1ebd5a] active:scale-95 transition-all">
                💬 Get Expert Opinion
            </button>
        </div>
    </div>

    <div id="viewContact" class="hidden w-full max-w-md px-4 pb-24 mx-auto flex flex-col gap-6">
        <div class="text-center">
            <h2 class="text-blue-500 font-black italic text-2xl uppercase tracking-tighter">Get a Quote</h2>
            <p class="text-slate-400 text-xs mt-2">Looking for a specific car? Let our experts find it.</p>
        </div>
        <form id="leadForm" class="space-y-4">
            <input type="text" id="leadName" required placeholder="Full Name" class="w-full bg-slate-900 border border-slate-800 rounded-2xl px-5 py-4 text-sm text-white focus:border-blue-500 outline-none">
            <input type="tel" id="leadPhone" required placeholder="WhatsApp Number" class="w-full bg-slate-900 border border-slate-800 rounded-2xl px-5 py-4 text-sm text-white focus:border-blue-500 outline-none">
            <textarea id="leadMessage" rows="3" placeholder="Which car are you looking for?" class="w-full bg-slate-900 border border-slate-800 rounded-2xl px-5 py-4 text-sm text-white focus:border-blue-500 outline-none"></textarea>
            <button type="submit" class="w-full bg-blue-600 text-white font-black py-5 rounded-2xl uppercase tracking-widest shadow-lg">Send Inquiry</button>
        </form>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 h-20 bg-slate-950 border-t border-slate-900 flex justify-around items-center z-50 px-4">
        <button id="navScanner" class="flex flex-col items-center gap-1 text-blue-500">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path></svg>
            <span class="text-[8px] font-bold uppercase">Scanner</span>
        </button>
        <a href="https://afriditrading.com/cars" target="_blank" class="flex flex-col items-center gap-1 text-slate-500">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 002-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
            <span class="text-[8px] font-bold uppercase">Auctions</span>
        </a>
        <button id="navContact" class="flex flex-col items-center gap-1 text-slate-500">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"></path></svg>
            <span class="text-[8px] font-bold uppercase">Contact</span>
        </button>
    </nav>

    <script type="module">
        // import { inject } from '@vercel/analytics';
        // inject();
    </script>
    <script type="module" src="chat.js"></script>
</body>
</html>
